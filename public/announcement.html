<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Cake 🎂</title>

<link rel="stylesheet" href="announcement.css">
</head>

<body>

<!-- Balloons -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<!-- Big Background Hearts -->
<div class="bg-heart"></div>
<div class="bg-heart"></div>
<div class="bg-heart"></div>

<!-- Cake -->
<img src="/images/vending4.jpeg" class="cake" onclick="burstHearts()">

<!-- Flame -->
<div class="flame"></div>

<!-- Sparkles -->
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>

<!-- Photo Section -->
<div class="photo-section">
    <img src="/images/vending5.jpeg" class="photo">
    <h2 class="birthday-text">🎉 Happy Birthday 🎉</h2>
</div>
<div class="reel-section">
    <h2 class="reel-title">🎬 Reel for you</h2>

    <div class="reel-box">

        <a href="https://www.instagram.com/reel/DVG996_DLsr/?igsh=aTBoOGw2cmM3MXVy" target="_blank" class="reel-item">
            <img src="/images/vendingR1.jpeg" class="reel-thumb">
            <div class="like">❤️</div>
        </a>

        <a href="https://www.instagram.com/reel/DV6Ro0_jFyL/?igsh=MThxb2w2bGdsaHZlaQ==" target="_blank" class="reel-item">
            <img src="/images/vendingR2.jpeg" class="reel-thumb">
            <div class="like">❤️</div>
        </a>

        <a href="https://www.instagram.com/reel/DVAtwQrgnEP/?igsh=MXFtNmdmc3I1ZTAzbw==" target="_blank" class="reel-item">
            <img src="/images/vendingR3.jpeg" class="reel-thumb">
            <div class="like">❤️</div>
        </a>

    </div>
</div>

<!-- Hearts container -->
<div id="hearts-container"></div>

<script>
function burstHearts() {
    const container = document.getElementById("hearts-container");

    for (let i = 0; i < 40; i++) {
        const heart = document.createElement("div");
        heart.className = "burst-heart";

        heart.style.left = "50%";
        heart.style.top = "50%";

        heart.style.setProperty("--x", (Math.random() * 400 - 200) + "px");
        heart.style.setProperty("--y", (Math.random() * -300) + "px");

        container.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 1500);
    }
}
</script>

</body>
</html>
